  <style>
    html {
      scroll-behavior: smooth;
      background: #16130a;
    }
    body {
      font-family: 'Epilogue', sans-serif;
      background-color: #16130a;
      color: #e9e2d2;
    }
    [hidden] {
      display: none !important;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    section[id] {
      scroll-margin-top: 112px;
    }
    .plans-grid,
    .process-grid,
    .footer-links {
      display: grid;
      gap: 1.5rem;
    }
    .plans-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .process-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .footer-links {
      grid-template-columns: repeat(auto-fit, minmax(120px, max-content));
      justify-content: center;
    }
    .plan-card {
      backdrop-filter: blur(20px);
    }
    .plan-card.highlighted {
      border-top-width: 4px;
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
    }
    .mobile-nav-panel {
      background: rgba(22, 19, 10, 0.96);
    }
    .desktop-nav-links {
      position: relative;
      padding-bottom: 0.5rem;
    }
    .desktop-nav-link {
      position: relative;
      padding-bottom: 0.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #cec6ad;
      transition: color .3s ease, opacity .3s ease;
      white-space: nowrap;
    }
    .desktop-nav-link:hover,
    .desktop-nav-link.is-active {
      color: #FDE047;
    }
    .desktop-nav-indicator {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      border-radius: 9999px;
      background: #FDE047;
      box-shadow: 0 0 18px rgba(253, 224, 71, 0.24);
      opacity: 0;
      pointer-events: none;
      transform: translateX(0);
      transition: transform .28s ease, width .28s ease, opacity .2s ease;
      will-change: transform, width;
    }
  </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
  <header class="fixed inset-x-0 top-0 z-50 bg-[#16130a]/80 backdrop-blur-xl">
    <nav class="mx-auto flex w-full max-w-screen-2xl items-center justify-between px-6 py-4 md:px-8 md:py-6">
      <a id="brand-link" href="index.html" class="text-2xl font-black uppercase tracking-tighter text-white">
        <span id="brand-prefix" style="letter-spacing:-1.2px;">studio</span>
        <span id="brand-name" style="letter-spacing:-1.2px;">jinyeong</span>
      </a>
      <div id="nav-links" class="desktop-nav-links hidden items-center gap-8 md:flex"></div>
      <div class="flex items-center gap-3">
        <button id="menu-toggle" type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-lg border border-white/10 bg-white/5 text-[#FDE047] md:hidden" aria-expanded="false" aria-controls="mobile-nav" aria-label="메뉴 열기">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <a id="nav-cta" href="contact.html" class="rounded-lg bg-primary-container px-5 py-2.5 text-sm font-bold text-on-primary transition-transform active:scale-95 md:px-6">문의하기</a>
      </div>
    </nav>
    <div id="mobile-nav" class="mobile-nav-panel border-t border-white/10 md:hidden" hidden>
      <div class="mx-auto flex max-w-screen-2xl flex-col gap-3 px-6 py-6">
        <div id="mobile-nav-links" class="flex flex-col gap-2"></div>
        <a id="mobile-nav-cta" href="contact.html" class="mt-2 inline-flex justify-center rounded-lg bg-primary-container px-6 py-3 text-sm font-bold text-on-primary">문의하기</a>
      </div>
    </div>
  </header>

  <main id="site-main" class="pt-32 pb-24">
    <section id="pricing" class="px-6 md:px-8">
      <div class="mx-auto max-w-screen-xl">
        <header class="mb-20">
          <div id="pricing-eyebrow" class="mb-4 inline-block rounded-sm bg-surface-container-highest px-3 py-1 text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-primary-container"></div>
          <h1 id="pricing-title" class="mb-6 text-4xl font-black leading-[1.1] tracking-tighter md:text-6xl"></h1>
          <p id="pricing-description" class="max-w-2xl text-lg leading-relaxed text-on-surface-variant"></p>
        </header>

        <div id="pricing-plans" class="plans-grid"></div>

        <div class="mt-24 grid gap-6 md:grid-cols-2">
          <section id="custom-work-copy" class="flex flex-col justify-center bg-surface-container-low p-10">
            <h2 id="custom-work-title" class="mb-6 text-3xl font-bold"></h2>
            <p id="custom-work-description" class="mb-8 leading-relaxed text-on-surface-variant"></p>
            <div class="flex items-center gap-4">
              <span id="custom-work-highlight" class="text-xl font-black italic tracking-tight text-primary-container"></span>
              <span class="h-px flex-1 bg-outline-variant"></span>
            </div>
          </section>

          <section id="custom-work-media" class="group relative h-[320px] overflow-hidden md:h-[400px]">
            <img id="custom-work-image" class="h-full w-full object-cover grayscale transition-transform duration-700 group-hover:scale-110 group-hover:grayscale-0" alt="" src="">
            <div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-60"></div>
            <div class="absolute bottom-8 left-8">
              <div id="custom-work-eyebrow" class="mb-2 text-xs font-bold uppercase tracking-[0.3em] text-primary-container"></div>
              <div id="custom-work-caption" class="text-2xl font-bold"></div>
            </div>
          </section>
        </div>

        <section id="process-section" class="mt-24 border-t border-outline-variant pt-16">
          <h2 id="process-title" class="mb-10 text-center text-2xl font-bold"></h2>
          <div id="process-grid" class="process-grid"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="w-full px-6 py-16 md:px-8 md:py-24">
    <div class="mx-auto flex max-w-screen-2xl flex-col items-center gap-10 border-t border-outline-variant/20 pt-12 text-center">
      <div id="footer-title" class="text-3xl font-black uppercase tracking-tighter text-white md:text-4xl"></div>
      <div id="footer-links" class="footer-links"></div>
      <div id="footer-copy" class="text-[0.6875rem] uppercase tracking-[0.15em] text-outline opacity-60"></div>
    </div>
  </footer>

  <script src="script.js?v=20260421-2"></script>

</html>
